<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1A2A5E">
<title>Menú del día · QR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#1A2A5E;--gold:#C8963E;--cream:#F5F0E8;--ink:#2b2b2b}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);font-family:'Lato',sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:28px 16px}
  .wrap{max-width:820px;margin:0 auto}
  /* PIN */
  .pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center}
  .pin-screen h1{font-family:'Playfair Display',serif;color:var(--navy);font-size:26px;font-weight:800;margin-bottom:20px}
  .pin-input{font-size:30px;letter-spacing:.5em;text-align:center;width:200px;padding:14px;border:2px solid var(--navy);border-radius:14px;background:#fff;color:var(--navy);font-weight:700}
  .pin-err{color:#d23;font-size:14px;height:20px;margin-top:12px}
  /* panel */
  .panel{display:none}
  .head{text-align:center;margin-bottom:8px}
  .head h1{font-family:'Playfair Display',serif;color:var(--navy);font-size:26px;font-weight:800}
  .head p{color:#888;font-size:13px;margin-top:4px}
  .toolbar{text-align:center;margin:18px 0 26px}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px 26px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
  .qr-card{background:#fff;border:1px solid rgba(26,42,94,.15);border-radius:14px;padding:18px 14px;text-align:center;break-inside:avoid;page-break-inside:avoid}
  .qr-card .box{display:flex;justify-content:center;align-items:center;min-height:170px}
  .qr-card canvas,.qr-card img{width:160px;height:160px}
  .qr-card .nombre{font-family:'Playfair Display',serif;color:var(--navy);font-size:20px;font-weight:800;margin-top:10px}
  .qr-card .marca{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px}
  .qr-card .url{font-size:9px;color:#bbb;margin-top:4px;word-break:break-all}
  @media print{
    body{background:#fff;padding:0}
    .toolbar,.head p{display:none}
    .head h1{font-size:20px;margin:8px 0}
    .grid{gap:10px}
    .qr-card{border:1px solid #ddd;box-shadow:none}
    @page{margin:10mm}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="pin-screen" id="pinScreen">
    <h1>Menú del día · QR</h1>
    <input class="pin-input" id="pinInput" type="tel" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off">
    <div class="pin-err" id="pinErr"></div>
  </div>

  <div class="panel" id="panel">
    <div class="head">
      <h1>QR de los 7 locales</h1>
      <p>Cada QR abre el menú público de su local. Imprime esta hoja (A4) y pega un QR por mesa.</p>
    </div>
    <div class="toolbar"><button class="btn" onclick="window.print()">🖨️ Imprimir hoja A4</button></div>
    <div class="grid" id="grid"></div>
  </div>

</div>

<!-- qrcode.js (ligero, genera el QR en el navegador, sin servicios externos) -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
'use strict';
var PIN='2024';
// Base pública de la herramienta (subcarpeta /menu del repo PaginaWEB en GitHub Pages).
// Si cambia el dominio, edita solo esta línea.
var BASE='https://laagendadelgrupo.github.io/PaginaWEB/menu/menu.html?local=';

var LOCALES=[
  {id:'la_pequena',   nombre:'La Pequeña 2.0'},
  {id:'las_tablas',   nombre:'Las Tablas 2.0'},
  {id:'la_chula',     nombre:'La Chula 2.0'},
  {id:'la_traviesa',  nombre:'La Traviesa 2.0'},
  {id:'la_peluqueria',nombre:'La Peluquería 2.0'},
  {id:'juanita',      nombre:'Juanita 2.0'},
  {id:'green',        nombre:'Green 2.0'}
];

var $=function(id){return document.getElementById(id);};

function entrar(){$('pinScreen').style.display='none';$('panel').style.display='block';pintar();}
(function(){
  if(localStorage.getItem('menudia_pin_ok')==='1'){entrar();return;}
  var inp=$('pinInput');inp.focus();
  inp.addEventListener('input',function(){
    $('pinErr').textContent='';
    if(inp.value.length>=PIN.length){
      if(inp.value===PIN){localStorage.setItem('menudia_pin_ok','1');entrar();}
      else{$('pinErr').textContent='PIN incorrecto';inp.value='';}
    }
  });
})();

function pintar(){
  var grid=$('grid');grid.innerHTML='';
  LOCALES.forEach(function(l){
    var url=BASE+l.id;
    var card=document.createElement('div');card.className='qr-card';
    card.innerHTML='<div class="marca">Grupo 2.0 · Menú del día</div><div class="box"></div><div class="nombre">'+l.nombre+'</div><div class="url">'+url+'</div>';
    grid.appendChild(card);
    new QRCode(card.querySelector('.box'),{text:url,width:160,height:160,colorDark:'#1A2A5E',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  });
}
</script>
</body>
</html>
